<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — NB UI Kit</title>
  <link rel="stylesheet" href="../css/nb-all.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="nb-bg-gray-50">

  <!-- Full-viewport centered wrapper -->
  <main class="nb-flex nb-items-center nb-justify-center nb-min-h-screen nb-px-4 nb-py-8">

    <div style="width: 100%; max-width: 400px;">

      <!-- Card -->
      <div class="nb-card nb-shadow-lg">
        <div class="nb-card__body nb-p-8">

          <!-- Lock Icon -->
          <div class="nb-text-center nb-mb-6">
            <div class="nb-inline-flex nb-items-center nb-justify-center nb-bg-gray-100 nb-border nb-rounded-full" style="width: 56px; height: 56px;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
          </div>

          <!-- Heading -->
          <h1 class="nb-text-center nb-text-2xl nb-font-extrabold nb-mb-1">Forgot your password?</h1>
          <p class="nb-text-center nb-text-sm nb-text-gray-500 nb-mb-6">Enter your email and we'll send you a reset link</p>

          <!-- Forgot Password Form -->
          <form action="#" method="post">

            <!-- Email -->
            <div class="nb-field">
              <label for="reset-email" class="nb-label">Email address</label>
              <input type="email" id="reset-email" name="email" class="nb-input" placeholder="you@example.com" required autocomplete="email">
            </div>

            <!-- Send reset link button -->
            <button type="submit" class="nb-btn nb-btn--primary nb-btn--full nb-btn--lg">Send reset link</button>
          </form>

          <!-- Back to sign in -->
          <div class="nb-text-center nb-mt-6">
            <a href="login.html" class="nb-inline-flex nb-items-center nb-gap-2 nb-text-sm nb-font-medium" style="text-decoration: none; color: var(--nb-gray-600);">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
              Back to sign in
            </a>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="../js/nb-all.js"></script>
</body>
</html>
