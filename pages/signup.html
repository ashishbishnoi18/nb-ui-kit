<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — NB UI Kit</title>
  <link rel="stylesheet" href="../css/nb-all.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="nb-bg-gray-50">

  <!-- Full-viewport centered wrapper -->
  <main class="nb-flex nb-items-center nb-justify-center nb-min-h-screen nb-px-4 nb-py-8">

    <div style="width: 100%; max-width: 400px;">

      <!-- Card -->
      <div class="nb-card nb-shadow-lg">
        <div class="nb-card__body nb-p-8">

          <!-- Logo / Brand -->
          <div class="nb-text-center nb-mb-6">
            <a href="../index.html" class="nb-inline-flex nb-items-center nb-justify-center nb-font-extrabold nb-text-2xl nb-text-black" style="text-decoration: none; gap: 4px;">
              <span class="nb-bg-green-500 nb-border nb-rounded nb-px-2 nb-py-1" style="line-height: 1;">NB</span>
            </a>
          </div>

          <!-- Heading -->
          <h1 class="nb-text-center nb-text-2xl nb-font-extrabold nb-mb-1">Create your account</h1>
          <p class="nb-text-center nb-text-sm nb-text-gray-500 nb-mb-6">Start your 14-day free trial</p>

          <!-- Signup Form -->
          <form action="#" method="post">

            <!-- Full Name -->
            <div class="nb-field">
              <label for="signup-name" class="nb-label">Full name</label>
              <input type="text" id="signup-name" name="name" class="nb-input" placeholder="Jane Doe" required autocomplete="name">
            </div>

            <!-- Email -->
            <div class="nb-field">
              <label for="signup-email" class="nb-label">Email address</label>
              <input type="email" id="signup-email" name="email" class="nb-input" placeholder="you@example.com" required autocomplete="email">
            </div>

            <!-- Password -->
            <div class="nb-field">
              <label for="signup-password" class="nb-label">Password</label>
              <div class="nb-password-wrapper">
                <input type="password" id="signup-password" name="password" class="nb-input" placeholder="Create a password" required autocomplete="new-password" minlength="8">
                <button class="nb-password-wrapper__toggle" data-nb-password-toggle="#signup-password" type="button">
                  <span class="nb-sr-only">Show password</span>
                </button>
              </div>
              <p class="nb-help-text">At least 8 characters</p>
            </div>

            <!-- Terms agreement -->
            <div class="nb-mb-6">
              <label class="nb-checkbox" style="align-items: flex-start;">
                <input type="checkbox" name="terms" class="nb-checkbox__input" required>
                <span class="nb-checkbox__box" style="margin-top: 2px;"></span>
                <span class="nb-checkbox__label">I agree to the <a href="#" style="color: var(--nb-blue-500);">Terms of Service</a> and <a href="#" style="color: var(--nb-blue-500);">Privacy Policy</a></span>
              </label>
            </div>

            <!-- Create account button -->
            <button type="submit" class="nb-btn nb-btn--primary nb-btn--full nb-btn--lg">Create account</button>
          </form>

          <!-- Divider -->
          <div class="nb-flex nb-items-center nb-gap-3 nb-my-6">
            <span class="nb-flex-1 nb-border-t"></span>
            <span class="nb-text-xs nb-text-gray-500 nb-whitespace-nowrap">or sign up with</span>
            <span class="nb-flex-1 nb-border-t"></span>
          </div>

          <!-- Social Buttons -->
          <div class="nb-grid nb-grid-cols-2 nb-gap-3">
            <button type="button" class="nb-btn nb-btn--outline">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>
            <button type="button" class="nb-btn nb-btn--outline">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
              GitHub
            </button>
          </div>

          <!-- Bottom link -->
          <p class="nb-text-center nb-text-sm nb-text-gray-500 nb-mt-6">
            Already have an account?
            <a href="login.html" class="nb-font-semibold" style="color: var(--nb-blue-500);">Sign in</a>
          </p>

        </div>
      </div>

    </div>
  </main>

  <script src="../js/nb-all.js"></script>
</body>
</html>
